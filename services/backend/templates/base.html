<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8">
  <title>{{ title or "Study Hub" }}</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <!-- Tailwind CDN -->
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-slate-950 text-slate-100">
  <header class="border-b border-slate-800 bg-slate-900/70 backdrop-blur">
    <div class="max-w-6xl mx-auto flex items-center justify-between py-3 px-4">
      <a href="/" class="flex items-center gap-2">
        <span class="w-8 h-8 rounded-xl bg-indigo-500 flex items-center justify-center font-bold">SH</span>
        <span class="font-semibold text-lg">Study Hub</span>
      </a>
      <form action="/" method="get" class="hidden md:flex items-center gap-2">
        <input name="q" value="{{ q or '' }}" placeholder="Tìm tài liệu..."
               class="px-3 py-1.5 rounded-xl bg-slate-800 border border-slate-700 text-sm w-64 focus:outline-none focus:ring-2 focus:ring-indigo-500">
        <button class="px-3 py-1.5 rounded-xl bg-indigo-500 text-sm font-medium hover:bg-indigo-400">Tìm</button>
      </form>
      <div class="flex items-center gap-3 text-sm">
        {% if current_user %}
          <span class="text-slate-300">Xin chào, <strong>{{ current_user.username }}</strong></span>
          <a href="/upload" class="px-3 py-1.5 rounded-xl bg-emerald-500 hover:bg-emerald-400">Upload</a>
          <a href="/logout" class="px-3 py-1.5 rounded-xl border border-slate-600 hover:bg-slate-800">Đăng xuất</a>
        {% else %}
          <a href="/login" class="px-3 py-1.5 rounded-xl border border-slate-600 hover:bg-slate-800">Đăng nhập</a>
          <a href="/register" class="px-3 py-1.5 rounded-xl bg-indigo-500 hover:bg-indigo-400">Đăng ký</a>
        {% endif %}
      </div>
    </div>
  </header>

  <!-- mobile search -->
  <div class="md:hidden px-4 py-2 bg-slate-900 border-b border-slate-800">
    <form action="/" method="get" class="flex gap-2">
      <input name="q" value="{{ q or '' }}" placeholder="Tìm tài liệu..."
             class="flex-1 px-3 py-1.5 rounded-xl bg-slate-800 border border-slate-700 text-sm focus:outline-none focus:ring-2 focus:ring-indigo-500">
      <button class="px-3 py-1.5 rounded-xl bg-indigo-500 text-sm font-medium hover:bg-indigo-400">Tìm</button>
    </form>
  </div>

  <main class="max-w-6xl mx-auto px-4 py-6">
    {% block content %}{% endblock %}
  </main>

  <footer class="border-t border-slate-800 py-4 text-center text-xs text-slate-500">
    Study Hub · Demo UI cho đồ án NT219
  </footer>
</body>
</html>
