{% extends "base.html" %}
{% block content %}
<h1 class="text-2xl font-semibold mb-4">Upload tài liệu</h1>

<form action="/upload" method="post" enctype="multipart/form-data"
      class="space-y-4 max-w-xl border border-slate-800 bg-slate-900/60 rounded-2xl p-5">
  <div>
    <label class="block text-sm mb-1">Chọn file</label>
    <input type="file" name="file" required
           class="w-full text-sm text-slate-200 file:mr-3 file:px-3 file:py-1.5 file:rounded-lg
                  file:border-0 file:bg-indigo-500 file:text-white
                  bg-slate-900 border border-slate-700 rounded-xl px-2 py-1.5"/>
  </div>

  <div>
    <label class="block text-sm mb-1">Tiêu đề</label>
    <input type="text" name="title" placeholder="Tên tài liệu"
           class="w-full px-3 py-2 rounded-xl bg-slate-900 border border-slate-700 text-sm focus:outline-none focus:ring-2 focus:ring-indigo-500"/>
  </div>

  <div>
    <label class="block text-sm mb-1">Mô tả</label>
    <textarea name="description" rows="3" placeholder="Mô tả ngắn"
              class="w-full px-3 py-2 rounded-xl bg-slate-900 border border-slate-700 text-sm focus:outline-none focus:ring-2 focus:ring-indigo-500"></textarea>
  </div>

  <div class="grid md:grid-cols-2 gap-4">
    <div>
      <label class="block text-sm mb-1">Môn học</label>
      <select name="subject"
              class="w-full px-3 py-2 rounded-xl bg-slate-900 border border-slate-700 text-sm">
        {% for s in subjects %}
          <option value="{{ s }}">{{ s }}</option>
        {% endfor %}
      </select>
    </div>
    <div>
      <label class="block text-sm mb-1">Tag (phân cách bằng dấu phẩy)</label>
      <input type="text" name="tags" placeholder="crypto, jwt, mmh"
             class="w-full px-3 py-2 rounded-xl bg-slate-900 border border-slate-700 text-sm"/>
    </div>
  </div>

  <div class="flex items-center gap-2">
    <input type="checkbox" name="is_public" value="true" class="rounded border-slate-600">
    <span class="text-sm text-slate-300">Cho phép share link đọc công khai</span>
  </div>

  <button class="px-4 py-2 rounded-xl bg-indigo-500 text-sm font-medium hover:bg-indigo-400">
    Upload
  </button>
</form>
{% endblock %}
