{% extends "base.html" %}
{% block content %}
<h1 class="text-2xl font-semibold mb-4">Đăng ký tài khoản</h1>

<form action="/register" method="post"
      class="max-w-sm border border-slate-800 bg-slate-900/60 rounded-2xl p-5 space-y-4">
  {% if error %}
    <div class="text-sm text-red-400 mb-2">{{ error }}</div>
  {% endif %}
  <div>
    <label class="block text-sm mb-1">Username</label>
    <input type="text" name="username" required
           class="w-full px-3 py-2 rounded-xl bg-slate-900 border border-slate-700 text-sm"/>
  </div>
  <div>
    <label class="block text-sm mb-1">Email</label>
    <input type="email" name="email" required
           class="w-full px-3 py-2 rounded-xl bg-slate-900 border border-slate-700 text-sm"/>
  </div>
  <div>
    <label class="block text-sm mb-1">Password</label>
    <input type="password" name="password" required
           class="w-full px-3 py-2 rounded-xl bg-slate-900 border border-slate-700 text-sm"/>
  </div>
  <button class="w-full px-4 py-2 rounded-xl bg-indigo-500 text-sm font-medium hover:bg-indigo-400">
    Đăng ký
  </button>
  <p class="text-xs text-slate-400 mt-1">
    Sau khi đăng ký, hệ thống sẽ gửi mã xác nhận (demo: in trong console).
  </p>
</form>
{% endblock %}
