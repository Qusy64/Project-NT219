{% extends "base.html" %}
{% block content %}
<h1 class="text-2xl font-semibold mb-4">Xác nhận email</h1>

<div class="max-w-sm border border-slate-800 bg-slate-900/60 rounded-2xl p-5">
  {% if email %}
    <p class="text-sm text-slate-300 mb-3">
      Mã xác nhận đã được gửi tới email: <span class="font-semibold">{{ email }}</span><br>
      (Demo: xem mã trong console server.)
    </p>
  {% endif %}
  {% if error %}
    <div class="text-sm text-red-400 mb-3">{{ error }}</div>
  {% endif %}

  <form action="/verify" method="post" class="space-y-3">
    <div>
      <label class="block text-sm mb-1">Nhập mã xác nhận (6 chữ số)</label>
      <input type="text" name="code" required
             class="w-full px-3 py-2 rounded-xl bg-slate-900 border border-slate-700 text-sm"/>
    </div>
    <button class="w-full px-4 py-2 rounded-xl bg-emerald-500 text-sm font-medium hover:bg-emerald-400">
      Xác nhận
    </button>
  </form>
</div>
{% endblock %}
