version: "3.9"

services:
  keycloak:
    image: quay.io/keycloak/keycloak:24.0.5
    environment:
      KEYCLOAK_ADMIN: admin
      KEYCLOAK_ADMIN_PASSWORD: admin
    command:
      - start-dev
      - --import-realm
    volumes:
      - keycloak_data:/opt/keycloak/data
      - ../idp-config/realm-secure.json:/opt/keycloak/data/import/realm.json:ro
    ports:
      - "8080:8080"

  backend:
    image: python:3.11-slim
    working_dir: /app
    command: ["bash","-lc","pip install fastapi uvicorn && uvicorn app:app --host 0.0.0.0 --port 8001"]
    volumes:
      - ../services/backend:/app:ro
    ports:
      - "8002:8001"

  kong:
    image: kong:3.6
    environment:
      KONG_DATABASE: "off"
      KONG_DECLARATIVE_CONFIG: /etc/kong/kong.yml
      KONG_LOG_LEVEL: info
    volumes:
      - ../infra/kong.yml:/etc/kong/kong.yml:ro
    ports:
      - "8000:8000"
      - "8001:8001"
    depends_on:
      - backend
      - keycloak

volumes:
  keycloak_data:
